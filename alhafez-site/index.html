<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤسسة الحافظ — اختر الاستمارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0f6e56">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif}
  body{min-height:100vh;background:#0f6e56;
    background-image:linear-gradient(160deg,#0f6e56,#0b5d3b);
    display:flex;align-items:center;justify-content:center;padding:24px;color:#fff}
  .box{width:100%;max-width:480px;text-align:center}
  .box h1{font-size:26px;font-weight:700;margin-bottom:8px}
  .box .sub{font-size:15px;opacity:.9;margin-bottom:30px}
  .cards{display:grid;gap:16px}
  a.card{display:flex;align-items:center;gap:16px;background:#fff;color:#1f2421;
    text-decoration:none;border-radius:16px;padding:18px 20px;transition:.15s;
    box-shadow:0 8px 24px rgba(0,0,0,.18)}
  a.card:hover{transform:translateY(-3px)}
  a.card img{width:64px;height:64px;object-fit:contain;border-radius:12px;flex-shrink:0;background:#f4f5f1}
  a.card .t{flex:1;text-align:right}
  a.card .t b{display:block;font-size:17px;font-weight:700;color:#0f6e56;margin-bottom:3px}
  a.card .t span{font-size:13px;color:#6b7069}
  a.card .go{font-size:22px;color:#0f6e56}
  .foot{margin-top:26px;font-size:12px;opacity:.8}
</style>
</head>
<body>
  <div class="box">
    <h1>مؤسسة الحافظ</h1>
    <div class="sub">اختر الاستمارة المطلوبة للتقديم</div>
    <div class="cards">
      <a class="card" href="nursery/">
        <img src="nursery/logo.jpg" alt="حضانة الحافظ">
        <div class="t"><b>حضانة الحافظ للغات</b><span>استمارة تقديم — العام الدراسي 2027</span></div>
        <div class="go">‹</div>
      </a>
      <a class="card" href="quran/">
        <img src="quran/logo.jpg" alt="مدرسة الحافظ للقرآن">
        <div class="t"><b>مدرسة الحافظ لتحفيظ القرآن</b><span>استمارة تقديم — العام القرآني 2026-2027</span></div>
        <div class="go">‹</div>
      </a>
    </div>
    <div class="foot">مؤسسة الحافظ التعليمية</div>
  </div>
</body>
</html>
